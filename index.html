<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小马的游戏共创</title>
  <style>
    /* Prevent FOUC (Flash of Unstyled Content) */
    body {
      margin: 0;
      background-color: #8ced73;
      /* Match loading screen background */
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #8ced73;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      color: #fff;
      font-family: 'Fredoka One', 'Comic Sans MS', cursive, system-ui, sans-serif;
      text-shadow: 2px 2px 0 #000;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="loading-screen">
      <h1>Loading Game...</h1>
      <div class="loading-bar-container">
        <div id="loading-bar"></div>
      </div>
      <button id="start-btn" class="hidden">Start Game</button>
    </div>
    <canvas id="game-canvas" class="hidden"></canvas>
    <div id="ui-layer" class="hidden">
      <div id="ui">
        <div id="hud">
          <div style="margin-bottom: 8px; pointer-events: auto;">
            <button id="settings-btn" style="padding: 8px 16px; font-size: 18px; display: inline-flex; align-items: center; gap: 6px; border-radius: 8px; background: rgba(0,0,0,0.6); color: white; border: 2px solid #fff; font-family: 'Fredoka One', cursive; cursor: pointer;">
              ⚙️ <span id="settings-text">Settings</span>
            </button>
          </div>
          <div class="hud-item gold-container">
            <span class="gold-icon">🪙</span>
            <span id="gold">0</span>
          </div>
          <div class="hud-item hp-container">
            <div class="hp-bar-bg">
              <div id="hp-bar-fill" class="hp-bar-fill"></div>
            </div>
            <span id="hp">20 / 20</span>
          </div>
          
        </div>
        <div id="joystick-zone" class="mobile-only">
          <div id="joystick-knob"></div>
        </div>

        <div id="stats-panel">
          <h3>Arsenal</h3>
          <div id="weapon-stats"></div>
          <h3>Enemies</h3>
          <div id="enemy-stats"></div>
        </div>
        
        
        <div id="settings-modal" class="hidden" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #00ccff; color: white; padding: 25px; border-radius: 20px; z-index: 2500; text-align: center; min-width: 350px; border: 6px solid #000; box-shadow: 10px 10px 0px rgba(0, 0, 0, 1); pointer-events: auto;">
          <h2 id="settings-title" style="margin-top: 0; margin-bottom: 20px; color: #fff; text-shadow: 2px 2px 0 #000; font-size: 32px;">⚙️ 设置</h2>
          <div style="display: flex; flex-direction: column; gap: 12px; align-items: stretch; margin: 15px 0; padding: 15px; background: rgba(255, 255, 255, 0.2); border-radius: 12px; border: 3px solid #000;">
            <button id="mobile-shop-btn" style="padding: 10px; font-size: 16px; border-radius: 8px; background: #ff9900; color: #000; font-family: 'Fredoka One', cursive; cursor: pointer; border: 3px solid #000; font-weight: bold; box-shadow: 3px 3px 0 #000;">🛒 商店</button>
            <button id="mute-btn" style="padding: 10px; font-size: 16px; border-radius: 8px; background: #ff9900; color: #000; font-family: 'Fredoka One', cursive; cursor: pointer; border: 3px solid #000; font-weight: bold; box-shadow: 3px 3px 0 #000;">🔊 声音: 开</button>
            <button id="lang-btn" style="padding: 10px; font-size: 16px; border-radius: 8px; background: #ff9900; color: #000; font-family: 'Fredoka One', cursive; cursor: pointer; border: 3px solid #000; font-weight: bold; box-shadow: 3px 3px 0 #000;">🌐 中文</button>
            <button id="leaderboard-btn" style="padding: 10px; font-size: 16px; border-radius: 8px; background: #ff9900; color: #000; font-family: 'Fredoka One', cursive; cursor: pointer; border: 3px solid #000; font-weight: bold; box-shadow: 3px 3px 0 #000;">🏆 排行榜</button>
            <button id="encyclopedia-btn" style="padding: 10px; font-size: 16px; border-radius: 8px; background: #ff9900; color: #000; font-family: 'Fredoka One', cursive; cursor: pointer; border: 3px solid #000; font-weight: bold; box-shadow: 3px 3px 0 #000;">📖 图鉴</button>
            <div style="margin-top: 10px; font-size: 12px; color: #000; font-weight: bold;">
              <span class="desktop-only" id="desktop-hint">WASD移动 | P键商店</span>
            </div>
          </div>
          <button id="close-settings-btn" style="margin-top: 10px; padding: 10px 20px; font-size: 18px; font-family: 'Fredoka One', cursive; cursor: pointer; border: none; border-radius: 12px; background: #ffcc00; color: #000; width: 100%; font-weight: bold; border: 3px solid #000; box-shadow: 4px 4px 0px #000;">关闭</button>
        </div>
        <div id="leaderboard-modal" class="hidden" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: white; padding: 20px; border-radius: 10px; z-index: 3000; text-align: center; min-width: 250px; border: 2px solid #ffcc00;">
          <h2 style="margin-top: 0; color: #ffcc00; text-shadow: 1px 1px 0 #000;">🏆 Leaderboard</h2>
          <ol id="modal-leaderboard-list" style="text-align: left; font-size: 18px; margin: 15px 0; padding-left: 20px;"></ol>
          <button id="close-leaderboard-btn" style="padding: 8px 16px; font-size: 16px; font-family: 'Fredoka One', cursive; cursor: pointer; border: none; border-radius: 5px; background: #ffcc00; color: #333;">Close</button>
        </div>

        <div id="encyclopedia-modal" class="hidden" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: white; padding: 20px; border-radius: 10px; z-index: 3000; text-align: center; min-width: 400px; max-width: 600px; max-height: 80vh; overflow-y: auto; border: 2px solid #00ccff;">
          <h2 style="margin-top: 0; color: #00ccff; text-shadow: 1px 1px 0 #000;">📖 Encyclopedia</h2>
          <div id="encyclopedia-tabs" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 15px;">
            <button id="tab-weapons" style="padding: 6px 12px; font-size: 14px;">Weapons</button>
            <button id="tab-monsters" style="padding: 6px 12px; font-size: 14px;">Monsters</button>
            <button id="tab-pets" style="padding: 6px 12px; font-size: 14px;">Pets</button>
          </div>
          <div id="encyclopedia-content" style="text-align: left; font-size: 14px; margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; max-height: 400px; overflow-y: auto;"></div>
          <button id="close-encyclopedia-btn" style="padding: 8px 16px; font-size: 16px; font-family: 'Fredoka One', cursive; cursor: pointer; border: none; border-radius: 5px; background: #00ccff; color: #333;">Close</button>
        </div>

        <div id="shop" class="hidden">
          <h2>Shop</h2>
          <div class="shop-items">
            <button id="buy-damage">Upgrade Damage (<span id="cost-damage">20</span>g)</button>
            <button id="buy-speed">Upgrade Speed (<span id="cost-speed">15</span>g)</button>
            <button id="buy-hp">Upgrade Max HP (<span id="cost-hp">15</span>g)</button>
            <button id="buy-pet">Hatch Random Pet (<span id="cost-pet">50</span>g)</button>
          </div>
          <button id="close-shop">Close (P)</button>
        </div>
        <div id="game-over" class="hidden">
          <h2>Game Over</h2>
          <p>Score: <span id="final-score">0</span> Seconds</p>
          <div id="leaderboard-section">
            <h3>Leaderboard (Top 10)</h3>
            <ol id="leaderboard-list"></ol>
            <div id="leaderboard-input-section" class="hidden">
              <input type="text" id="player-name" placeholder="Enter your name" maxlength="15">
              <button id="save-score-btn">Save</button>
            </div>
          </div>
          <button id="restart-btn">Restart Game</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
